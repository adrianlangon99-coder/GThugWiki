<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Chat Room | ThugWiki</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Quick embedded styles to keep chat clean and glassmorphic */
    .chat-layout {
      display: flex;
      flex-direction: column;
      height: calc(100dvh - calc(env(safe-area-inset-top) + 130px));
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      max-width: 800px;
      margin: 0 auto;
    }
    .chat-messages {
      flex-grow: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .message-bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .message-bubble.incoming {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--glass-border);
      align-self: flex-start;
    }
    .message-bubble.outgoing {
      background: linear-gradient(135deg, var(--accent) 0%, #2563eb 100%);
      color: #ffffff;
      align-self: flex-end;
    }
    .msg-meta {
      font-size: 0.75rem;
      color: var(--text-sub);
      margin-bottom: 4px;
      display: block;
    }
    .chat-input-bar {
      display: flex;
      gap: 12px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.4);
      border-top: 1px solid var(--glass-border);
    }
    .chat-input-bar input {
      flex-grow: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      outline: none;
      font-size: 1rem;
    }
    .chat-input-bar input:focus { border-color: var(--accent); }
    .send-btn {
      background: var(--text-main);
      color: #000;
      border: none;
      padding: 0 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <nav class="app-top-bar">
    <a href="community.html" class="back-link" style="color: var(--text-sub); text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 600;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      Leave Room
    </a>
    <h1 class="site-brand" id="chat-room-title">Loading Hub...</h1>
    <div style="width: 80px;"></div>
  </nav>

  <main class="wiki-container">
    <div class="chat-layout">
      <div class="chat-messages" id="chat-box"></div>

      <form id="chat-form" class="chat-input-bar">
        <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" required>
        <button type="submit" class="send-btn">Send</button>
      </form>
    </div>
  </main>

  <script type="module" src="chat.js"></script>
</body>
</html>
