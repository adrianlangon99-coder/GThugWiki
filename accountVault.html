<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Account | ThugWiki</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="account.css">
</head>
<body>

  <nav class="app-top-bar">
    <a href="vault.html" class="nav-back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back
    </a>
    <h1 class="site-brand">Account</h1>
    <div class="nav-spacer"></div>
  </nav>

  <main class="wiki-container animate-in">
    
    <div class="thug-account-wrapper">
      
      <div class="profile-header-card">
        <div class="profile-avatar-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <div class="profile-meta-info">
          <h2 id="display-username" class="username-text">Loading...</h2>
          <p id="display-email" class="email-text">Fetching details...</p>
        </div>
      </div>

      <div class="profile-join-date">
        <p class="join-label">Wiki Member Since</p>
        <p id="display-date" class="join-value">--</p>
      </div>

      <div class="account-achievement-card">
        <div class="achievement-trophy">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
            <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path>
            <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path>
            <path d="M4 22h16"></path>
            <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"></path>
            <path d="M12 2a4 4 0 0 0-4 4v5a4 4 0 0 0 8 0V6a4 4 0 0 0-4-4z"></path>
          </svg>
        </div>

        <img src="https://res.cloudinary.com/ddrhamsxu/image/upload/q_auto/f_auto/v1781524403/IMG_0298_yewvzr.png" 
             alt="Official Thug Member Badge" 
             class="achievement-icon">
        
        <div class="achievement-divider"></div>

        <div class="achievement-details">
          <div class="achievement-meta">
            <span class="achievement-title">Thug Member</span>
            <span class="achievement-percentage">100%</span>
          </div>
          <p class="achievement-desc">Successfully verified your profile.</p>
          
          <div class="achievement-progress-track">
            <div class="achievement-progress-fill" style="width: 100%;"></div>
          </div>
        </div>
      </div>

      <button id="logout-btn" class="action-btn-danger">
        Sign Out
      </button>

    </div>

  </main>

  <script type="module" src="account.js"></script>
</body>
</html>
