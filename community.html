<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Communities | ThugWiki</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="community.css">
</head>
<body>

  <nav class="app-top-bar">
    <a href="app.html" style="text-decoration: none;">
      <h1 class="site-brand">
        ThugWiki 
      </h1>
    </a>
  </nav>

  <main class="wiki-container animate-in">
    
    <a href="app.html" class="back-nav-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Wiki
    </a>
    <br>

    <div class="communities-grid">
      <div class="community-hub-card">
        <div class="hub-banner" style="background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);"></div>
        <div class="hub-content">
          <div class="hub-info">
            <h3>Lore Theorists</h3>

          </div>
          <a href="chat.html?room=theorists" class="hub-btn">View</a>
        </div>
      </div>

      <div class="community-hub-card">
        <div class="hub-banner" style="background: linear-gradient(135deg, #5b21b6 0%, #8b5cf6 100%);"></div>
        <div class="hub-content">
          <div class="hub-info">
            <h3>Audio Hunters</h3>

          </div>
          <a href="chat.html?room=hunters" class="hub-btn">View</a>
        </div>
      </div>
      
      <div class="community-hub-card">
        <div class="hub-banner" style="background: linear-gradient(135deg, #065f46 0%, #10b981 100%);"></div>
        <div class="hub-content">
          <div class="hub-info">
            <h3>Meme Archivists</h3>

          </div>
          <a href="chat.html?room=archivists" class="hub-btn">View</a>
        </div>
      </div>
    </div>

  </main>

  <script type="module" src="community.js"></script>
</body>
</html>
