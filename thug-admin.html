<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ThugWiki - Vault Control Center</title>

<style>

.admin-panel {
  width: 100%;
  max-width: 500px;
  margin: 20px auto;
  background: rgba(20, 20, 25, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 24px;
  border-radius: 24px;
  backdrop-filter: blur(20px);
}

.admin-panel h2 {
  margin-top: 0;
  text-align: center;
  font-weight: 900;
  text-transform: uppercase;
  color: #fbbf24;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-weight: 700;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* The actual fix for your input boxes */
input[type="text"], 
.file-input-wrapper {
  width: 90%;
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.15);
  padding: 16px;
  border-radius: 16px;
  color: #fff;
  font-size: 1rem;
}

/* Styling the file button to look like a button */
input[type="file"]::file-selector-button {
  background: rgba(255, 255, 255, 0.1);
  border: none;
  border-radius: 8px;
  color: white;
  padding: 8px 12px;
  margin-right: 10px;
  cursor: pointer;
}

#admin-upload-btn {
  width: 100%;
  background: #fbbf24;
  color: #000;
  padding: 18px;
  border: none;
  border-radius: 16px;
  font-weight: 800;
  font-size: 1rem;
  cursor: pointer;
  text-transform: uppercase;
}


</style>
</head>
<body style="background: #050505; color: #ffffff; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100dvh; display: flex; align-items: center; justify-content: center; margin: 0;">

<div class="admin-panel">
  <h2>Upload to Vault</h2>
  
  <div class="form-group">
    <label>1. Video Title</label>
    <input type="text" id="admin-video-title" placeholder="e.g., Yes King - Live Session">
  </div>
  
  <div class="form-group">
    <label>2. Choose File</label>
    <div class="file-input-wrapper">
      <input type="file" id="admin-video-file" accept="video/*">
    </div>
  </div>
  
  <button id="admin-upload-btn" onclick="processAdminUpload()">Upload</button>
  <p id="upload-status-log"></p>
</div>



  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD_Ackc4JfTZYWJHYNCWxLafnwAsWqJrFQ",
      authDomain: "thugwiki-ffc4f.firebaseapp.com",
      projectId: "thugwiki-ffc4f",
      storageBucket: "thugwiki-ffc4f.firebasestorage.app",
      messagingSenderId: "173306478841",
      appId: "1:173306478841:web:ce40297f76906e6dc6e228"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Make function accessible inline
    window.processAdminUpload = async function() {
      const titleInput = document.getElementById("admin-video-title");
      const fileInput = document.getElementById("admin-video-file");
      const statusLog = document.getElementById("upload-status-log");
      const uploadBtn = document.getElementById("admin-upload-btn");

      if (!titleInput.value || !fileInput.files[0]) {
        alert("Missing fields!");
        return;
      }

      uploadBtn.disabled = true;
      uploadBtn.innerText = "Uploading Media File...";
      statusLog.innerText = "Transmitting to cloud systems...";

      const file = fileInput.files[0];
      
      // Cloudinary unsigned upload configuration parameter variables
      const cloudName = "ddrhamsxu"; 
      const uploadPreset = "vault_unsigned"; // Make sure to create this preset as 'Unsigned' in Cloudinary Settings!

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", uploadPreset);

      try {
        // 1. Stream data directly to Cloudinary REST API endpoint
        const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/video/upload`, {
          method: "POST",
          body: formData
        });
        const cloudData = await response.json();

        if (cloudData.public_id) {
          statusLog.innerText = "Media saved! Documenting database manifest...";

          // Format exact properties to match your path variations (.mov / .mp4, folder tags etc)
          const extension = cloudData.format || "mp4";
          const fullAssetPath = `${cloudData.public_id}.${extension}`;

          // 2. Insert records to Firestore collection architecture tracking log parameters
          await addDoc(collection(db, "vault_videos"), {
            title: titleInput.value,
            videoId: fullAssetPath,
            posterId: `${cloudData.public_id}.jpg`, // Cloudinary automatic video frame generation asset identity
            views: "0",
            likes: "0",
            createdAt: serverTimestamp()
          });

          statusLog.style.color = "#10b981";
          statusLog.innerText = "Vault deployment complete!";
          titleInput.value = "";
          fileInput.value = "";
        } else {
          throw new Error("Cloudinary error: " + JSON.stringify(cloudData));
        }
      } catch (err) {
        console.error(err);
        statusLog.style.color = "#f87171";
        statusLog.innerText = "Deployment failed. Check console console parameters logs.";
      } finally {
        uploadBtn.disabled = false;
        uploadBtn.innerText = "Push Live to Vault";
      }
    };
  </script>
</body>
</html>
